<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="calculator">
        <div class="display" placeholder="0">1 + 1 = 2</div>
        <div class="pad">
            <div class="left-side">
                <div class="main">
                    <div class="btn-clr" id="btn"><div class="inside-btn">C</div></div>
                    <div class="btn-del" id="btn"><div class="inside-btn">DEL</div></div>
                    <div class="btn-div" id="btn"><div class="inside-btn">/</div></div>

                    <div class="btn-num" id="btn"><div class="inside-btn">7</div></div>
                    <div class="btn-num" id="btn"><div class="inside-btn">8</div></div>
                    <div class="btn-num" id="btn"><div class="inside-btn">9</div></div>

                    <div class="btn-num" id="btn"><div class="inside-btn">4</div></div>
                    <div class="btn-num" id="btn"><div class="inside-btn">5</div></div>
                    <div class="btn-num" id="btn"><div class="inside-btn">6</div></div>

                    <div class="btn-num" id="btn"><div class="inside-btn">1</div></div>
                    <div class="btn-num" id="btn"><div class="inside-btn">2</div></div>
                    <div class="btn-num" id="btn"><div class="inside-btn">3</div></div>
                </div>
                <div class="special-zero">
                    <div class="btn-zero" id="btn"><div class="inside-btn-zero">0</div></div>
                    <div class="btn-dot" id="btn"><div class="inside-btn">.</div></div>
                </div>
            </div>
            <div class="right-side">
                <div class="btn-mul" id="btn"><div class="inside-btn">*</div></div>
                <div class="sub" id="btn"><div class="inside-btn">-</div></div>
                <div class="btn-add" id="btn"><div class="inside-btn">+</div></div>
                <div class="btn-eql" id="btn"><div class="inside-btn-eql">=</div></div>
            </div>
        </div>
    </div>
<script src="javascript.js"></script>
</body>
</html>
